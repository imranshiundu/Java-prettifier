name: Java CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile
        run: javac -d build Prettifier.java ItineraryStudio.java

      - name: Run smoke tests
        run: bash scripts/test.sh

      - name: Run studio demo
        run: bash scripts/studio-demo.sh
